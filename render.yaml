services:
  - type: web
    name: revit-mcp-server
    runtime: docker
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_TRANSPORT
        value: http
      # URL tới Revit plugin (qua ngrok hoặc public IP)
      # Ví dụ: https://abc123.ngrok-free.app
      - key: REVIT_URL
        sync: false
      # (Tùy chọn) API key bảo mật — đặt giá trị bí mật
      - key: API_KEY
        sync: false
