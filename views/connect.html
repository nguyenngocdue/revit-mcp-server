<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Revit — DeepBIM</title>
  <link rel="icon" type="image/png" href="/logos/logo_no_bg.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 16px; padding: 48px; max-width: 520px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo img { width: 36px; height: 36px; }
    .logo span { font-size: 18px; font-weight: 700; color: #f8fafc; }
    h1 { font-size: 22px; font-weight: 700; color: #f8fafc; margin-bottom: 6px; }
    .sub { color: #64748b; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=text] { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none; transition: border-color 0.15s; }
    input[type=text]:focus { border-color: #6366f1; }
    input[type=text]::placeholder { color: #475569; }
    button { margin-top: 16px; width: 100%; padding: 13px; background: #6366f1; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #4f46e5; }
    button:disabled { background: #374151; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 12px 16px; border-radius: 8px; font-size: 14px; display: none; }
    .status.ok { background: #22c55e22; border: 1px solid #22c55e44; color: #22c55e; }
    .status.err { background: #ef444422; border: 1px solid #ef444444; color: #f87171; }
    .current { margin-top: 24px; padding: 12px 16px; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; font-size: 13px; color: #64748b; word-break: break-all; }
    .current span { color: #a5b4fc; font-family: monospace; }
    .back { display: inline-block; margin-top: 24px; font-size: 13px; color: #475569; text-decoration: none; }
    .back:hover { color: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logos/logo_no_bg.png" alt="DeepBIM" onerror="this.style.display='none'" />
      <span>DeepBIM MCP</span>
    </div>
    <h1>Connect Revit Plugin</h1>
    <p class="sub">Paste the Cloudflare Tunnel URL to connect your local Revit to this server.</p>

    <label for="urlInput">Cloudflare Tunnel URL</label>
    <input type="text" id="urlInput" placeholder="https://xxxx.trycloudflare.com" value="{{CURRENT_URL}}" autocomplete="off" />
    <button id="btn" onclick="setUrl()">Connect</button>

    <div class="status" id="status"></div>

    <div class="current">
      Current URL: <span id="currentUrl">{{CURRENT_URL_DISPLAY}}</span>
    </div>

    <a class="back" href="/">← Back to Dashboard</a>
  </div>

  <script>
    async function setUrl() {
      const url = document.getElementById('urlInput').value.trim();
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      if (!url) {
        showStatus('Please enter a URL.', false);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connecting...';
      status.style.display = 'none';

      try {
        const res = await fetch('/set-revit-url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          showStatus('Connected! Revit URL updated successfully.', true);
          document.getElementById('currentUrl').textContent = data.url;
        } else {
          showStatus(data.error || 'Failed to update URL.', false);
        }
      } catch (e) {
        showStatus('Network error: ' + e.message, false);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Connect';
      }
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (ok ? 'ok' : 'err');
      el.style.display = 'block';
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') setUrl();
    });
  </script>
</body>
</html>
